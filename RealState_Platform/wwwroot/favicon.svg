<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      .building { fill: #007bff; }
      .door { fill: #0d6efd; }
      .window { fill: #fff; }
      .window-frame { fill: #005a9e; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" fill="#f8f9fa"/>
  
  <!-- Building Main Structure -->
  <rect x="48" y="80" width="160" height="140" class="building" rx="8"/>
  
  <!-- Door -->
  <rect x="108" y="140" width="40" height="80" class="door" rx="4"/>
  <circle cx="140" cy="180" r="3" fill="#ffc107"/>
  
  <!-- Windows Row 1 -->
  <g>
    <!-- Window 1-1 -->
    <rect x="60" y="95" width="22" height="22" class="window" rx="2"/>
    <line x1="71" y1="95" x2="71" y2="117" class="window-frame" stroke-width="1"/>
    <line x1="60" y1="106" x2="82" y2="106" class="window-frame" stroke-width="1"/>
    
    <!-- Window 1-2 -->
    <rect x="95" y="95" width="22" height="22" class="window" rx="2"/>
    <line x1="106" y1="95" x2="106" y2="117" class="window-frame" stroke-width="1"/>
    <line x1="95" y1="106" x2="117" y2="106" class="window-frame" stroke-width="1"/>
    
    <!-- Window 1-3 -->
    <rect x="130" y="95" width="22" height="22" class="window" rx="2"/>
    <line x1="141" y1="95" x2="141" y2="117" class="window-frame" stroke-width="1"/>
    <line x1="130" y1="106" x2="152" y2="106" class="window-frame" stroke-width="1"/>
    
    <!-- Window 1-4 -->
    <rect x="165" y="95" width="22" height="22" class="window" rx="2"/>
    <line x1="176" y1="95" x2="176" y2="117" class="window-frame" stroke-width="1"/>
    <line x1="165" y1="106" x2="187" y2="106" class="window-frame" stroke-width="1"/>
  </g>
  
  <!-- Windows Row 2 -->
  <g>
    <!-- Window 2-1 -->
    <rect x="60" y="125" width="22" height="22" class="window" rx="2"/>
    <line x1="71" y1="125" x2="71" y2="147" class="window-frame" stroke-width="1"/>
    <line x1="60" y1="136" x2="82" y2="136" class="window-frame" stroke-width="1"/>
    
    <!-- Window 2-2 (skipped for door) -->
    
    <!-- Window 2-3 (skipped for door) -->
    
    <!-- Window 2-4 -->
    <rect x="165" y="125" width="22" height="22" class="window" rx="2"/>
    <line x1="176" y1="125" x2="176" y2="147" class="window-frame" stroke-width="1"/>
    <line x1="165" y1="136" x2="187" y2="136" class="window-frame" stroke-width="1"/>
  </g>
  
  <!-- Windows Row 3 -->
  <g>
    <!-- Window 3-1 -->
    <rect x="60" y="155" width="22" height="22" class="window" rx="2"/>
    <line x1="71" y1="155" x2="71" y2="177" class="window-frame" stroke-width="1"/>
    <line x1="60" y1="166" x2="82" y2="166" class="window-frame" stroke-width="1"/>
    
    <!-- Window 3-2 -->
    <rect x="95" y="155" width="22" height="22" class="window" rx="2"/>
    <line x1="106" y1="155" x2="106" y2="177" class="window-frame" stroke-width="1"/>
    <line x1="95" y1="166" x2="117" y2="166" class="window-frame" stroke-width="1"/>
    
    <!-- Window 3-3 -->
    <rect x="130" y="155" width="22" height="22" class="window" rx="2"/>
    <line x1="141" y1="155" x2="141" y2="177" class="window-frame" stroke-width="1"/>
    <line x1="130" y1="166" x2="152" y2="166" class="window-frame" stroke-width="1"/>
    
    <!-- Window 3-4 -->
    <rect x="165" y="155" width="22" height="22" class="window" rx="2"/>
    <line x1="176" y1="155" x2="176" y2="177" class="window-frame" stroke-width="1"/>
    <line x1="165" y1="166" x2="187" y2="166" class="window-frame" stroke-width="1"/>
  </g>
  
  <!-- Roof -->
  <polygon points="40,80 128,30 216,80" fill="#0d6efd" opacity="0.9"/>
  <polygon points="40,80 128,30 216,80" fill="none" stroke="#005a9e" stroke-width="2" opacity="0.5"/>
  
  <!-- Shadow/Accent -->
  <rect x="48" y="80" width="160" height="140" class="building" rx="8" fill="none" stroke="#0d6efd" stroke-width="2" opacity="0.3"/>
</svg>
